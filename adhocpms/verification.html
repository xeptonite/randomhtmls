body {

    font-size: 11px;

}

/* Top Bar */
#topbar {
    background-color: #1b4d8c;

}

#topbar-inner {

}

#logo {

    border: 0;

}

#backlink {
    float: right;

    font-size: 10px;

#backlink a {
    color: #d6e6ff;
    text-decoration: none;
}

#backlink a:hover {
    text-decoration: underline;
}

/* Clear floats */

/* Login Box */
#loginbox {

    margin: 120px auto;
    border: 1px solid #163a6b;
    background-color: #e6eef9;

}

#content {
    padding: 16px;

.label {
    margin-bottom: 3px;

}

.inputfield {

    padding: 3px;
    border: 1px solid #7f9db9;
    margin-bottom: 10px;
    font-size: 11px;
    font-family: Tahoma, Arial, sans-serif;
}

.button {
    padding: 3px 16px;
    border: 1px solid #163a6b;
    background-color: #3b79c9;
    background-image: url("aero.png");
    background-repeat: repeat-x;
    color: #ffffff;
    cursor: pointer;
    font-size: 11px;
    font-family: Tahoma, Arial, sans-serif;
}

.button:hover {
    background-color: #c1d3ef;
}

#footer {
    text-align: center;
    padding: 8px;
    font-size: 9px;
    color: #2e2e2e;
    border-top: 1px solid #c0c0c0;
}
#pagefooter {
