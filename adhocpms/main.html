<script type="text/javascript">

var currentFolder = "inbox";
var selectedMail = null;

var mails = [
    {id:1, folder:"inbox", from:"adhoc@pms.adhoc.ur_rp", subject:"Fändroid 26.0 väljalaske kontseptid", date:"13.02.2026", body:"Sa saad failid allalaadida sealt aadressist: https://www.adhoc.ur_rp/ppf/f26/13.02.2026/fandroid26.0.pdf parooliga uMplE882!. Sa võid ainult näidada kontsepti pildid, aga mitte lingi. Ärge muretse kui kogematta lekkid, sest me siis saaksime seda faili IP-bännida Maalt, või ka väljastpoolt meie riiki. See on kontsept Fändroid 2.0 ja 6.0 kombineerimiseks, ka liquid glassina kesta.", read:true},
    {id:2, folder:"inbox", from:"adhoc@pms.adhoc.ur_rp", subject:"ADHOCi promotsioon (01.02.2026)", date:"01.02.2026", body:"Kuupalguna saadeti sinu postkasti või pangakontole ͽ15,555.00.", read:false},
    {id:3, folder:"inbox", from:"fandroid2@pms.adhoc.ur_rp", subject:"ma video idee sain", date:"29.06.2025", body:"tere! olen fändroid kahendas. Ma näen et minu komentaarid youtube kanalis on väga palju komentaare et reaktida ja ka võibolla proovida panna ennast suure õhupalli sisse. link on ishowspeedi (maalane) livestream mis on ronaldo ja jalgpalli tiimi rääkimist, siis mitu tundi hiljem siis on väga suur sinine õhupalliga balloon challange tegemine, mis läks vägagi ausalt valesti, sest nad küünistasid õhupalli tupsu. mina plaanin sedasugust videot teha juulis umbeski, kui tellid või ostad mingid 250 cm sinist õhupalli mis on saadaval world wibe webis. ma vägagi loodaks sa saad hakkama. nägemisemi! 🤖🎈🎈🎈", read:true}
];

function renderMails() {
    var table = document.getElementById("mailbody");
    table.innerHTML = "";
    var count = 0;

    for (var i = 0; i < mails.length; i++) {
        if (mails[i].folder == currentFolder) {
            count++;

            var row = document.createElement("tr");
            row.className = "mailrow";
            row.onclick = (function(mail){
                return function() { openMail(mail.id); }
            })(mails[i]);

            var unreadStyle = mails[i].read ? "" : "font-weight:bold;";

            row.innerHTML =
                "<td>" + mails[i].from + "</td>" +
                "<td style='" + unreadStyle + "'>" + mails[i].subject + "</td>" +
                "<td>" + mails[i].date + "</td>";

            table.appendChild(row);
        }
    }

    document.getElementById("mailcount").innerHTML = count;
}

function openMail(id) {
    for (var i = 0; i < mails.length; i++) {
        if (mails[i].id == id) {
            selectedMail = mails[i];
            mails[i].read = true;

            document.getElementById("viewer").style.display = "block";
            document.getElementById("viewerFrom").innerHTML = mails[i].from;
            document.getElementById("viewerSubject").innerHTML = mails[i].subject;
            document.getElementById("viewerDate").innerHTML = mails[i].date;
            document.getElementById("viewerBody").innerHTML = mails[i].body;

            renderMails();
            break;
        }
    }
}

function deleteMail() {
    if (selectedMail != null) {
        selectedMail.folder = "trash";
        selectedMail = null;
        document.getElementById("viewer").style.display = "none";
        renderMails();
    }
}

function markUnread() {
    if (selectedMail != null) {
        selectedMail.read = false;
        renderMails();
    }
}

function switchFolder(folder) {
    currentFolder = folder;
    selectedMail = null;
    document.getElementById("viewer").style.display = "none";
    renderMails();
}

function composeMail() {
    document.getElementById("compose").style.display = "block";
}

function sendMail() {
    document.getElementById("compose").style.display = "none";
}

window.onload = function() {
    renderMails();
    var year = new Date().getFullYear();
    document.getElementById("copyrightYear").innerHTML = year;
};

</script>

</head>

        </div>

<div class="menuitem" onclick="switchFolder('inbox')">Postkast</div>
<div class="menuitem" onclick="switchFolder('trash')">Prügikast</div>
    </div>

        <table class="mailtable">

    <div id="viewerBody"></div><br />
    <input type="button" value="Kustuta" class="button" onclick="deleteMail()" />
    <input type="button" value="Märgi lugemata" class="button" onclick="markUnread()" />
</div>

<div>kokku: <span id="mailcount"></span></div>

    </div>

    <div class="clear"></div>

</div>

<div id="compose" style="display:none; margin-top:15px; border:1px solid #b5c8e6; padding:10px; background:#ffffff;">

    saaja:<br />
    <input type="text" style="width:100%;" /><br /><br />
    teema:<br />
    <input type="text" style="width:100%;" /><br /><br />
    sisu:<br />
    <textarea style="width:100%; height:100px;"></textarea><br /><br />
    <input type="button" value="Saada" class="button" onclick="sendMail()" />
</div>
</div>
</div>
</div>
