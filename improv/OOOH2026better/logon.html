<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Log in to BowlingExpress</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="dark light" />
  <style>
  body {
  touch-action: pan-x pan-y;
}
html, body {
  max-width: 100vw;
  overflow-x: hidden;
}
		@font-face {
			font-family: 'Bowlings';
			src: url('poppins-v24-latin-regular.woff2') format('woff2');
			font-weight: normal;
			font-style: normal;
		}
		
		@font-face {
			font-family: 'Bowlings';
			src: url('poppins-v24-latin-700.woff2') format('woff2');
			font-weight: bold;
		}
    :root {
      --bg: #090b10;
      --panel: #10141c;
      --panel-2: #151b25;
      --panel-3: #1b2331;
      --panel-4: #0d1118;
      --line: #243041;
      --line-2: #30415b;
      --text: #ecf3ff;
      --text-soft: #9bb0d1;
      --text-dim: #7487a4;
      --accent: #3a78ff;
      --accent-strong: #1f5fe6;
      --accent-soft: rgba(58, 120, 255, 0.14);
      --success: #26b36d;
      --danger: #da4c4c;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.30);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 12px;
      --speed: 180ms;
      font-family: Bowlings, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #eef3fb;
        --panel: rgba(255, 255, 255, 0.88);
        --panel-2: #f7f9fd;
        --panel-3: #edf2fa;
        --panel-4: #f3f6fb;
        --line: #d7deeb;
        --line-2: #bec9de;
        --text: #162236;
        --text-soft: #425672;
        --text-dim: #6c7d98;
        --accent-soft: rgba(58, 120, 255, 0.10);
        --shadow: 0 18px 38px rgba(20, 34, 56, 0.10);
      }
    }

    @keyframes softRise {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes gentlePulse {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      color-scheme: light dark;
      transition: background var(--speed), color var(--speed);
    }

    img { display: block; max-width: 100%; }
    button, input { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .auth-shell {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      transition: background var(--speed), border-color var(--speed), box-shadow var(--speed), transform var(--speed);
      animation: softRise 280ms ease-out both;
    }

    .auth-shell {
      border-radius: var(--radius-xl);
      padding: 32px;
      width: min(100%, 520px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-card {
      width: min(100%, 430px);
      display: grid;
      gap: 22px;
    }

    .auth-head {
      display: grid;
      gap: 14px;
    }

    .user-badge {
      width: 74px;
      height: 74px;
      border-radius: 22px;
      border: 1px solid var(--line-2);
      background: var(--panel-2);
      display: grid;
      place-items: center;
      color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .user-badge svg {
      width: 36px;
      height: 36px;
      display: block;
	  filter: brightness(0) saturate(100%) invert(34%) sepia(98%) saturate(3015%) hue-rotate(200deg) brightness(102%) contrast(106%);
    }

    .auth-head h2 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.04;
      letter-spacing: -0.04em;
    }

    .auth-head p {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.6;
    }

    .auth-form {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-size: 0.92rem;
      color: var(--text-soft);
      font-weight: 600;
    }

    .field input {
      width: 100%;
      height: 54px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      padding: 0 16px;
      transition: border-color var(--speed), background var(--speed), box-shadow var(--speed);
    }

    .field input::placeholder {
      color: var(--text-dim);
    }

    .field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(58, 120, 255, 0.12);
      background: var(--panel-3);
    }

    .inline-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .check {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: 0.94rem;
      cursor: pointer;
      user-select: none;
    }

    .check input {
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 6px;
      border: 1px solid var(--line-2);
      background: var(--panel-2);
      margin: 0;
      position: relative;
    }

    .check input:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check input:checked::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 2px;
      width: 4px;
      height: 8px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .inline-link {
      color: var(--text-soft);
      font-size: 0.94rem;
      transition: color var(--speed);
    }

    .inline-link:hover {
      color: var(--text);
    }

    .primary-btn,
    .secondary-btn,
    .social-btn {
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--line);
      min-height: 54px;
      transition: transform var(--speed), border-color var(--speed), background var(--speed), filter var(--speed);
    }

    .primary-btn {
      background: var(--accent);
      border-color: #4c88ff;
      color: #fff;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .primary-btn:hover,
    .secondary-btn:hover,
    .social-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .secondary-btn {
      background: var(--panel-2);
      color: var(--text);
      font-weight: 700;
    }

    .social-stack {
      display: grid;
      gap: 12px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-dim);
      font-size: 0.88rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .social-grid {
      display: grid;
      gap: 12px;
    }

    .social-btn {
      background: var(--panel-2);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 16px;
      font-weight: 700;
    }

    .social-btn svg {
      width: 20px;
      height: 20px;
      display: block;
      fill: currentColor;
      flex-shrink: 0;
    }
	
.social-btn img {
  width: 22px;
  height: 22px;
  min-width: 22px;
  max-width: 22px;
  max-height: 22px;
  object-fit: contain;
  display: inline-block;
  flex-shrink: 0;
}

/* only icons that should be monochrome */
.social-btn[data-provider="Balloons United"] img {
  filter: brightness(0) invert(1);
}

@media (prefers-color-scheme: light) {
  .social-btn[data-provider="Balloons United"] img {
    filter: brightness(0) invert(0);
  }
}

    .notice {
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 18px;
      padding: 16px 18px;
      color: var(--text-soft);
      line-height: 1.6;
      font-size: 0.94rem;
    }

    .notice strong {
      display: block;
      color: var(--text);
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(16px);
      min-width: min(440px, calc(100vw - 28px));
      padding: 14px 18px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(16, 20, 28, 0.96);
      color: var(--text);
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--speed), transform var(--speed);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 640px) {
      .page {
        padding: 14px;
      }

      .auth-shell {
        width: 100%;
        padding: 20px;
        border-radius: 22px;
      }

      .inline-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .auth-head h2 {
        font-size: 1.75rem;
      }
    }
  
    .auth-shell {
      animation-delay: 90ms;
    }

    .status-chip,
    .social-btn,
    .submit-btn,
    .input-shell {
      transition: transform var(--speed), background var(--speed), border-color var(--speed), box-shadow var(--speed), color var(--speed);
    }

    .status-dot {
      animation: gentlePulse 2.6s ease-in-out infinite;
    }

    .social-btn:hover,
    .submit-btn:hover,
    .input-shell:focus-within {
      transform: translateY(-1px);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

  </style>
</head>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const toast = document.getElementById('toast');
    let toastTimer;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2600);
    }

    document.getElementById('loginForm').addEventListener('submit', (event) => {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        showToast('Enter both email and password.');
        return;
      }

      showToast('Signed in locally. Connect your real auth flow whenever ready.');
    });

    document.getElementById('passkeyBtn').addEventListener('click', () => {
      showToast('Passkey prompt placeholder opened.');
    });

    document.querySelectorAll('[data-provider]').forEach((button) => {
      button.addEventListener('click', () => {
        showToast(`Continue with ${button.dataset.provider} pressed.`);
      });
    });
  </script>
