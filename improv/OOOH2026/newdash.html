<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BowlingExpress · Control Center</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <meta name="color-scheme" content="dark light" />
  <style>
  body {
  touch-action: pan-x pan-y;
  overscroll-behavior-x: none;
  overscroll-behavior-y: none;
}
html, body {
  max-width: 100vw;
  overflow-x: hidden;
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  position: relative;
}
	@font-face {
			font-family: 'Bowlings';
			src: url('poppins-v24-latin-regular.woff2') format('woff2');
			font-weight: normal;
			font-style: normal;
		}
		
		@font-face {
			font-family: 'Bowlings';
			src: url('poppins-v24-latin-700.woff2') format('woff2');
			font-weight: bold;
		}
    :root {
      --bg: #090b10;
      --panel: #10141c;
      --panel-2: #151b25;
      --panel-3: #1b2331;
      --panel-4: #0d1118;
      --line: #243041;
      --line-2: #30415b;
      --text: #ecf3ff;
      --text-soft: #9bb0d1;
      --text-dim: #7487a4;
      --accent: #3a78ff;
      --accent-strong: #1f5fe6;
      --accent-soft: rgba(58, 120, 255, 0.14);
      --success: #26b36d;
      --warning: #d7a72b;
      --danger: #da4c4c;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --sidebar-width: 284px;
      --header-height: 74px;
      --speed: 180ms;
      font-family: Bowlings, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body.light {
      --bg: #eef2f8;
      --panel: #ffffff;
      --panel-2: #f7f9fd;
      --panel-3: #edf2fa;
      --panel-4: #f3f6fb;
      --line: #d7deeb;
      --line-2: #bec9de;
      --text: #162236;
      --text-soft: #425672;
      --text-dim: #6c7d98;
      --accent-soft: rgba(58, 120, 255, 0.10);
      --shadow: 0 18px 34px rgba(18, 33, 58, 0.10);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      overflow-x: hidden;
	  overflow-y: auto;
      transition: background var(--speed), color var(--speed);
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app {
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      height: 100dvh;
      min-height: 100dvh;
      width: 100%;
    }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--panel-4);
      border-right: 1px solid var(--line);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-width: 0;
      transition: width var(--speed), padding var(--speed);
      overflow: hidden;
	  overflow-x: hidden;
	overflow-y: auto;
    }

    .sidebar.collapsed {
      width: 94px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 56px;
    }

    .brand-badge {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: var(--accent-soft);
      border: 1px solid var(--line-2);
      color: var(--text);
      display: grid;
      place-items: center;
      font-weight: 800;
      letter-spacing: 0.08em;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
      flex-shrink: 0;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-logo {
      padding: 0;
      overflow: hidden;
      background: var(--panel-2);
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .user-avatar {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid var(--line-2);
      background: var(--panel-2);
      display: grid;
      place-items: center;
      flex-shrink: 0;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .user-avatar svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .user-avatar circle,
    .user-avatar path {
      stroke: currentColor;
    }

    .user-avatar .avatar-dot {
      fill: currentColor;
      stroke: none;
      opacity: 0.95;
    }

    .brand-title {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .brand-sub {
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-top: 2px;
      white-space: nowrap;
    }

    .collapse-toggle,
    .mobile-menu-btn,
    .icon-btn,
    .ghost-btn,
    .primary-btn,
    .danger-btn,
    .segmented button,
    .chip,
    .fab,
    .drawer-close,
    .filter-btn {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 12px;
      transition: background var(--speed), border-color var(--speed), transform var(--speed), color var(--speed);
    }

    .collapse-toggle {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      margin-left: auto;
      flex-shrink: 0;
    }

    .collapse-toggle:hover,
    .mobile-menu-btn:hover,
    .icon-btn:hover,
    .ghost-btn:hover,
    .segmented button:hover,
    .chip:hover,
    .drawer-close:hover,
    .filter-btn:hover {
      background: var(--panel-3);
      border-color: var(--line-2);
    }

    .primary-btn {
      background: var(--accent);
      border-color: var(--accent-strong);
      color: white;
      font-weight: 700;
    }

    .primary-btn:hover,
    .danger-btn:hover,
    .fab:hover {
      transform: translateY(-1px);
    }

    .filter-btn.active {
      background: var(--accent-soft);
      border-color: rgba(58, 120, 255, 0.35);
      color: var(--text);
    }

    .danger-btn {
      background: rgba(218, 76, 76, 0.16);
      border-color: rgba(218, 76, 76, 0.4);
      color: #ffd0d0;
    }

    .sidebar-block {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .sidebar-label {
      color: var(--text-dim);
      font-size: 0.77rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      color: var(--text-soft);
      position: relative;
      min-height: 48px;
    }

    .nav-item .nav-icon {
      width: 24px;
      text-align: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .nav-item.active {
      background: var(--accent-soft);
      color: var(--text);
      border: 1px solid rgba(58, 120, 255, 0.35);
    }

    .nav-item.active::after {
      content: "";
      position: absolute;
      right: 12px;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
    }

    .nav-title,
    .brand-copy,
    .sidebar-footer-copy,
    .sidebar-chip-copy {
      transition: opacity var(--speed), width var(--speed);
    }

    .sidebar-footer-copy {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar-chip {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 18px;
      background: var(--panel-2);
      border: 1px solid var(--line);
    }

    .sidebar-chip strong {
      display: block;
      font-size: 0.95rem;
    }

    .sidebar-chip small {
      display: block;
      color: var(--text-dim);
      margin-top: 3px;
    }

    .sidebar-footer {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar.collapsed .brand-copy,
    .sidebar.collapsed .nav-title,
    .sidebar.collapsed .sidebar-footer-copy,
    .sidebar.collapsed .sidebar-chip-copy,
    .sidebar.collapsed .sidebar-label {
      opacity: 0;
      width: 0;
      overflow: hidden;
	  overflow-x: hidden;
		overflow-y: auto;
      pointer-events: none;
    }

    .sidebar.collapsed .nav-item,
    .sidebar.collapsed .sidebar-chip {
      justify-content: center;
      padding-left: 10px;
      padding-right: 10px;
    }

    .sidebar.collapsed .nav-item.active::after {
      right: 8px;
    }

    .main {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: var(--bg);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(9, 11, 16, 0.78);
      backdrop-filter: blur(12px);
      position: relative;
      z-index: 8;
    }

    body.light .topbar {
      background: rgba(238, 242, 248, 0.84);
    }

    .topbar-left,
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .topbar-left {
      flex: 1 1 auto;
    }

    .topbar-right {
      flex: 0 1 auto;
    }

    .mobile-menu-btn {
      width: 44px;
      height: 44px;
      display: none;
      place-items: center;
    }

    .crumb-wrap {
      min-width: 0;
    }

    .eyebrow {
      font-size: 0.76rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 4px;
    }

    .page-title {
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-shell {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 0 14px;
      min-width: min(440px, 44vw);
      height: 48px;
    }

    .search-shell input {
      flex: 1;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      min-width: 0;
    }

    .search-shell input::placeholder {
      color: var(--text-dim);
    }

    .icon-btn,
    .ghost-btn,
    .primary-btn,
    .danger-btn,
    .filter-btn {
      height: 46px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 650;
      white-space: nowrap;
    }

    .icon-btn {
      width: 46px;
      padding: 0;
    }

    .content {
      min-height: 0;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 24px;
      padding-bottom: 96px;
    }

    .page {
      display: none;
      animation: pageIn 220ms ease;
    }

    .page.active {
      display: block;
    }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-grid {
      display: grid;
      gap: 18px;
    }

    .hero {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 22px;
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(320px, 0.9fr);
      gap: 18px;
    }

    .hero-copy h1,
    .section-title {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2.15rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .hero-copy p,
    .section-subtitle,
    .panel-note,
    .metric-note,
    .empty-state p,
    .leader-sub,
    .achievement-copy p,
    .coach-copy p,
    .stats-meta,
    .list-line small,
    .chip-note {
      color: var(--text-soft);
      line-height: 1.55;
    }

    .hero-copy p {
      max-width: 62ch;
      margin: 14px 0 20px;
    }

    .inline-actions,
    .chip-row,
    .toolbar,
    .settings-grid,
    .modal-actions,
    .table-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .chip {
      padding: 8px 12px;
      color: var(--text-soft);
      font-size: 0.9rem;
    }

    .hero-panel {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .hero-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .tiny-stat {
      background: var(--panel-3);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }

    .tiny-stat strong,
    .metric-value,
    .kpi-value,
    .archive-pill strong,
    .coach-line strong {
      display: block;
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .tiny-stat span,
    .metric-label,
    .kpi-label,
    .archive-pill span,
    .field label,
    .field-help,
    .switch-line span,
    .table-meta,
    .coach-line span {
      color: var(--text-dim);
      font-size: 0.88rem;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .kpi-card,
    .panel,
    .coach-card,
    .achievement-card,
    .leader-card,
    .archive-pill {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .kpi-card {
      padding: 18px;
      position: relative;
      overflow: hidden;
    }

    .kpi-card::before {
      content: "";
      position: absolute;
      inset: auto auto 0 0;
      width: 100%;
      height: 4px;
      background: var(--accent);
      opacity: 0.8;
    }

    .kpi-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
    }

    .kpi-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--accent-soft);
      border: 1px solid rgba(58, 120, 255, 0.3);
      flex-shrink: 0;
    }

    .kpi-value {
      font-size: clamp(1.7rem, 2.2vw, 2.2rem);
      margin-bottom: 6px;
    }

    .kpi-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .kpi-trend {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 9px;
      border-radius: 999px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--text-soft);
      font-size: 0.84rem;
    }

    .split {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(300px, 0.95fr);
      gap: 18px;
    }

    .panel {
      padding: 20px;
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .panel-title {
      font-size: 1.06rem;
      font-weight: 800;
      margin: 0;
    }

    .panel-kicker {
      color: var(--text-dim);
      font-size: 0.76rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .list-stack {
      display: grid;
      gap: 12px;
    }

    .list-line {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-radius: 18px;
      background: var(--panel-2);
      border: 1px solid var(--line);
    }

    .list-icon {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--panel-3);
      border: 1px solid var(--line);
      flex-shrink: 0;
    }

    .list-line strong {
      display: block;
      font-size: 0.98rem;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .score-pill,
    .status-pill,
    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      background: var(--panel);
      font-size: 0.84rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-pill.good { color: #9be2ba; border-color: rgba(38, 179, 109, 0.35); background: rgba(38, 179, 109, 0.12); }
    .status-pill.warn { color: #ffe29a; border-color: rgba(215, 167, 43, 0.35); background: rgba(215, 167, 43, 0.12); }
    .status-pill.bad { color: #ffb3b3; border-color: rgba(218, 76, 76, 0.35); background: rgba(218, 76, 76, 0.12); }

    .mini-chart {
      display: grid;
      gap: 12px;
    }

    .bar-line {
      display: grid;
      grid-template-columns: 76px 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .bar-track {
      height: 12px;
      border-radius: 999px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      min-width: 8px;
      width: 0;
      transition: width 260ms ease;
    }

    .toolbar {
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .table-shell {
      overflow: hidden;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .table-scroll {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    thead {
      background: var(--panel-2);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }

    th {
      color: var(--text-dim);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      font-weight: 700;
    }

    tbody tr {
      background: transparent;
      transition: background var(--speed);
    }

    tbody tr:hover {
      background: var(--panel-2);
    }

    .table-actions {
      justify-content: flex-end;
    }

    .table-link {
      color: var(--text-soft);
      cursor: pointer;
      border: 0;
      background: transparent;
      padding: 0;
    }

    .table-link:hover {
      color: var(--text);
    }

    .table-empty,
    .empty-state {
      padding: 38px 20px;
      text-align: center;
    }

    .empty-state {
      border: 1px dashed var(--line-2);
      border-radius: 22px;
      background: var(--panel);
    }

    .empty-state strong {
      display: block;
      font-size: 1.06rem;
      margin-bottom: 8px;
    }

    .leaderboard-grid,
    .achievements-grid,
    .coach-grid,
    .stats-grid,
    .archive-grid {
      display: grid;
      gap: 16px;
    }

    .leaderboard-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .leader-card {
      padding: 20px;
      display: grid;
      gap: 12px;
    }

    .leader-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .leader-rank {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--panel-2);
      border: 1px solid var(--line);
      font-weight: 800;
    }

    .leader-score {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .leader-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .archive-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .archive-pill {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .achievements-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .achievement-card {
      padding: 20px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .achievement-icon {
      width: 54px;
      height: 54px;
      border-radius: 18px;

    .achievement-copy h3,

    .stats-grid {

    .metrics-list {

    .metric-row {

    .coach-card {

    }

    .coach-console {
      padding: 16px;
      border-radius: 18px;

    .field-grid {

    .field {

      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;

    .field input,
    .field select,
    .field textarea {
      width: 100%;

      background: var(--panel-2);
      color: var(--text);
      border-radius: 14px;
      padding: 13px 14px;
      outline: none;
      transition: border-color var(--speed), background var(--speed);
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus,
    .search-shell:focus-within {
      border-color: var(--accent);
    }

    .segmented {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .segmented button {
      padding: 10px 12px;
      font-weight: 700;
    }

    .segmented button.active {
      background: var(--accent-soft);
      border-color: rgba(58,120,255,0.35);
      color: var(--text);
    }

    .switch-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px;
      border-radius: 18px;
      background: var(--panel-2);
      border: 1px solid var(--line);
    }

    .switch {
      position: relative;
      width: 50px;
      height: 28px;
      display: inline-block;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: var(--panel-3);
      border: 1px solid var(--line);
      transition: background var(--speed), border-color var(--speed);
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      left: 2px;
      top: 2px;
      border-radius: 999px;
      background: #fff;
      transition: transform var(--speed);
    }

    .switch input:checked + .slider {
      background: var(--accent);
      border-color: var(--accent-strong);
    }

    .switch input:checked + .slider::before {
      transform: translateX(22px);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--speed), visibility var(--speed);
      z-index: 25;

    .overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .drawer {
      position: fixed;
      top: 18px;
      right: 18px;
      bottom: 18px;

      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      transform: translateX(calc(100% + 28px));
      transition: transform 220ms ease;
      z-index: 30;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .drawer.active {
      transform: translateX(0);

    .drawer-head,

      padding: 20px;
      display: grid;
      gap: 18px;

    .drawer-title {

    .fab {

/* desktop: hide collapse + mobile controls */

  .be-toast {

</style>

<body>

  <div class="overlay" id="overlay"><div class="be-toast" id="beToast">

</div></div>

  <script>
    const LEGACY_LOGS_KEY = "be-logs";
    const LEGACY_SETTINGS_KEY = "be-settings";
    const LOGS_KEY = "bowlingexpress-rehaul-logs";
    const SETTINGS_KEY = "bowlingexpress-rehaul-settings";

    const NAV_ITEMS = [
      { id: "overview", label: "Overview", icon: "◫" },
      { id: "logs", label: "Score Logs", icon: "🎳" },
      { id: "leaderboard", label: "Leaderboard", icon: "📊" },
      { id: "archive", label: "Archive", icon: "🗃️" },
      { id: "achievements", label: "Achievements", icon: "🥇" },
      { id: "statistics", label: "Statistics", icon: "📈" },
      { id: "coach", label: "AI Coach", icon: "🤖" }
    ];

    const ACHIEVEMENTS = [
      {
        id: "first-log",
        title: "First blood on the Lane",
        icon: "◎",
        description: "Log your first session into the system.",
        unlocked: logs => logs.length >= 1
      },
      {
        id: "three-stack",
        title: "Triple stack",
        icon: "◌",
        description: "Reach at least three logged sessions.",
        unlocked: logs => logs.length >= 3
      },
      {
        id: "two-hundred-club",
        title: "200 Club",
        icon: "◆",
        description: "Score 200 or more in any single entry.",
        unlocked: logs => logs.some(log => Number(log.score) >= 200)
      },
      {
        id: "two-fifty-club",
        title: "250 Menace",
        icon: "◈",
        description: "Score 250 or more in any single entry.",
        unlocked: logs => logs.some(log => Number(log.score) >= 250)
      },
      {
        id: "perfect-run",
        title: "Perfect game",
        icon: "✦",
        description: "Hit a full 300 and flex forever.",
        unlocked: logs => logs.some(log => Number(log.score) >= 300)
      },
      {
        id: "road-demon",
        title: "Road demon",
        icon: "▣",
        description: "Log scores from at least three different locations.",
        unlocked: logs => new Set(logs.map(log => normalizeText(log.location))).size >= 3
      }
    ];

    const COACH_OPENERS = [
      "Lane control looks decent. The real suspect is consistency.",
      "This dashboard says you have score spikes. That usually means timing is either excellent or actively plotting against you.",
      "You are not lacking peak moments. You are lacking repeatable brutality.",
      "Your higher scores keep proving the ceiling exists. Now the floor needs to stop collapsing."
    ];

    const COACH_TIPS = [
      "Keep your approach speed boringly stable. Dramatic hero runs look cool and ruin accuracy.",
      "Pick one visual target and commit. Staring at the pins like they owe you money is not a lane strategy.",
      "If your notes mention splits a lot, your entry angle is probably snitching on you.",
      "When a session starts ugly, slow down before you start inventing seventeen new techniques in real time.",
      "Your best scores probably came from fewer corrections, not more panic stacked on panic."
    ];

    const SEED_LOGS = [];

    const state = {
      logs: [],
      settings: {},
      currentPage: "overview",
      activeDrawer: null,
      filters: {
        query: "",
        ball: "all",
        sort: "newest"
      },
      mobileMenuOpen: false,
      activeBallDraft: "light",
      activeBallDefault: "light"
    };

    const $ = selector => document.querySelector(selector);
    const $$ = selector => Array.from(document.querySelectorAll(selector));

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getStoredJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (error) {
        console.error(`failed reading ${key}`, error);
        return fallback;
      }
    }

    function saveJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function migrateLegacyData() {
      const existingLogs = getStoredJson(LOGS_KEY, null);
      const existingSettings = getStoredJson(SETTINGS_KEY, null);

      if (!existingLogs) {
        const legacyLogs = getStoredJson(LEGACY_LOGS_KEY, null);
        if (Array.isArray(legacyLogs) && legacyLogs.length) {
          saveJson(LOGS_KEY, legacyLogs.map(log => ({
            ...log,
            archived: Boolean(log.archived)
          })));
        }
      }

      if (!existingSettings) {
        const legacySettings = getStoredJson(LEGACY_SETTINGS_KEY, null);
        if (legacySettings && typeof legacySettings === "object") {
          saveJson(SETTINGS_KEY, legacySettings);
        }
      }
    }

    function hydrateState() {

      const storedSettings = getStoredJson(SETTINGS_KEY, null);
      state.logs = Array.isArray(storedLogs) ? storedLogs : [...SEED_LOGS];
      state.settings = { ...buildDefaultSettings(), ...(storedSettings || {}) };
      state.activeBallDraft = state.settings.defaultBall || "light";
      state.activeBallDefault = state.settings.defaultBall || "light";
    }

    function persistSettings() {

    function formatDate(value) {
      if (!value) return "unknown date";
      const date = new Date(`${value}T12:00:00`);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric"
      }).format(date);
    }

    function formatCompactDate(value) {
      if (!value) return "n/a";
      const date = new Date(`${value}T12:00:00`);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat(undefined, {
        month: "short",
        day: "numeric"
      }).format(date);
    }

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function calcMetrics(sourceLogs = state.logs) {
      const scores = sourceLogs.map(log => Number(log.score)).filter(score => Number.isFinite(score));
      const total = sourceLogs.length;
      const totalVisible = sourceLogs.filter(log => !log.archived).length;
      const average = scores.length ? Math.round(scores.reduce((sum, value) => sum + value, 0) / scores.length) : 0;
      const best = scores.length ? Math.max(...scores) : 0;
      const worst = scores.length ? Math.min(...scores) : 0;
      const strikes = scores.length ? Math.round(scores.reduce((sum, value) => sum + value, 0) / 20) : 0;
      const uniqueLocations = new Set(sourceLogs.map(log => normalizeText(log.location)).filter(Boolean)).size;
      return { total, totalVisible, average, best, worst, strikes, uniqueLocations };
    }

    function getFilteredLogs(includeArchived = false) {
      const query = normalizeText(state.filters.query);
      let rows = state.logs.filter(log => includeArchived ? log.archived : !log.archived);

      if (query) {
        rows = rows.filter(log => {
          const bag = [log.date, log.location, log.notes, log.ball, log.score].map(normalizeText).join(" ");
          return bag.includes(query);
        });
      }

      if (state.filters.ball !== "all") {
        rows = rows.filter(log => normalizeText(log.ball) === state.filters.ball);
      }

      const sorters = {
        newest: (a, b) => String(b.date).localeCompare(String(a.date)),
        oldest: (a, b) => String(a.date).localeCompare(String(b.date)),
        highest: (a, b) => Number(b.score) - Number(a.score),
        lowest: (a, b) => Number(a.score) - Number(b.score)
      };

      rows.sort(sorters[state.filters.sort] || sorters.newest);
      return rows;
    }

    function getTopLogs(limit = 3) {
      return [...state.logs]
        .filter(log => !log.archived)
        .sort((a, b) => Number(b.score) - Number(a.score))
        .slice(0, limit);
    }

    function getRecentLogs(limit = 5) {
      return [...state.logs]
        .filter(log => !log.archived)
        .sort((a, b) => String(b.date).localeCompare(String(a.date)))
        .slice(0, limit);
    }

    function getArchivePreview(limit = 3) {
      return [...state.logs]
        .filter(log => log.archived)
        .sort((a, b) => String(b.date).localeCompare(String(a.date)))
        .slice(0, limit);
    }

    function getAchievementStatus() {
      return ACHIEVEMENTS.map(item => ({
        ...item,
        done: item.unlocked(state.logs)
      }));
    }

    function locationFrequency(logs) {
      const counts = {};
      logs.forEach(log => {
        const label = (log.location || "unknown").trim() || "unknown";
        counts[label] = (counts[label] || 0) + 1;
      });
      return Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5);
    }

    function ballFrequency(logs) {
      const counts = { light: 0, medium: 0, heavy: 0 };
      logs.forEach(log => {
        const key = normalizeText(log.ball);
        if (counts[key] !== undefined) counts[key] += 1;
      });
      return counts;
    }

    function scoreBuckets(logs) {
      const ranges = [
        { label: "0-99", min: 0, max: 99 },
        { label: "100-149", min: 100, max: 149 },
        { label: "150-199", min: 150, max: 199 },
        { label: "200-249", min: 200, max: 249 },
        { label: "250+", min: 250, max: 999 }
      ];
      return ranges.map(range => ({
        label: range.label,
        count: logs.filter(log => {
          const score = Number(log.score);
          return score >= range.min && score <= range.max;
        }).length
      }));
    }

    function bestStreak(logs) {
      const sorted = [...logs].sort((a, b) => String(a.date).localeCompare(String(b.date)));
      let longest = 0;
      let current = 0;
      sorted.forEach(log => {
        if (Number(log.score) >= 200) {
          current += 1;
          longest = Math.max(longest, current);
        } else {
          current = 0;
        }
      });
      return longest;
    }

    function getCoachLines() {
      const metrics = calcMetrics();
      const top = getTopLogs(1)[0];
      const lines = [];
      lines.push(COACH_OPENERS[Math.floor(Math.random() * COACH_OPENERS.length)]);

      if (!state.logs.length) {
        lines.push("Nothing is logged yet, so the ai coach is basically staring into a bowling void right now.");
        lines.push("Start with one real session and this page becomes ten times more useful.");
        return lines;
      }

      if (metrics.average >= 180) {
        lines.push("Average is looking sharp. This is not random good luck anymore.");
      } else if (metrics.average >= 130) {
        lines.push("Average is decent, but there is still room to squeeze more repeatability out of your release.");
      } else {
        lines.push("The numbers say fundamentals first. The lane does not negotiate with panic adjustments.");
      }

      if (top) {
        lines.push(`Top session so far: ${top.score} at ${top.location || "unknown lane"} on ${formatDate(top.date)}.`);
      }

      lines.push(COACH_TIPS[Math.floor(Math.random() * COACH_TIPS.length)]);
      return lines;
    }

                    <span class="status-pill ${item.done ? "good" : "bad"}">${item.done ? "unlocked" : "locked"}</span>
                  </div>
                </article>
              `).join("")}
            </div>
          </section>
        </div>
      `;
    }

    function renderStatisticsPage() {
      const root = $("#page-statistics");
      const metrics = calcMetrics();
      const buckets = scoreBuckets(state.logs);
      const locations = locationFrequency(state.logs);
      const ballStats = ballFrequency(state.logs);
      const totalBallEntries = Math.max(1, ballStats.light + ballStats.medium + ballStats.heavy);
      root.innerHTML = `
        <div class="page-grid">
          <section class="stats-grid">
            <article class="panel">
              <div class="panel-head">
                <div>
                  <div class="panel-kicker">Score Distribution</Div>
                  <h2 class="section-title">Where the sessions land</h2>
                </div>
              </div>
              <div class="mini-chart">
                ${buckets.map(bucket => {
                  const width = Math.max(8, Math.round((bucket.count / Math.max(...buckets.map(item => item.count), 1)) * 100));
                  return `<div class="bar-line"><span>${bucket.label}</span><div class="bar-track"><div class="bar-fill" style="width:${bucket.count ? width : 0}%"></div></div><strong>${bucket.count}</strong></div>`;
                }).join("")}
              </div>
              <div class="stats-meta" style="margin-top:14px">quick view of low, mid, and strong sessions across all stored data.</div>
            </article>

            <article class="panel">
              <div class="panel-head">
                <div>
                  <div class="panel-kicker">Core Metrics</div>
                  <h2 class="section-title">Numbers that matter</h2>
                </div>
              </div>
              <div class="metrics-list">
                <div class="metric-row"><div><div class="metric-label">Best Streak over 200</div><div class="metric-note">consecutive logged sessions</div></div><div class="metric-value">${bestStreak(state.logs)}</div></div>
                <div class="metric-row"><div><div class="metric-label">Worst Score</div><div class="metric-note">Every control room needs the ugly truth</div></div><div class="metric-value">${metrics.worst}</div></div>
                <div class="metric-row"><div><div class="metric-label">Unique Lanes</div><div class="metric-note">Different locations with at least one log</div></div><div class="metric-value">${metrics.uniqueLocations}</div></div>
                <div class="metric-row"><div><div class="metric-label">Archive Count</div><div class="metric-note">Sessions currently stored away</div></div><div class="metric-value">${state.logs.filter(log => log.archived).length}</div></div>
              </div>
            </article>
          </section>

          <section class="split">
            <article class="panel">
              <div class="panel-head">
                <div>
                  <div class="panel-kicker">Ball Usage</div>
                  <h2 class="section-title">Equipment preference split</h2>
                </div>
              </div>
              <div class="mini-chart">
                ${["light", "medium", "heavy"].map(key => {
                  const count = ballStats[key];
                  const width = Math.max(8, Math.round((count / totalBallEntries) * 100));
                  return `<div class="bar-line"><span>${key}</span><div class="bar-track"><div class="bar-fill" style="width:${count ? width : 0}%"></div></div><strong>${count}</strong></div>`;
                }).join("")}
              </div>
            </article>

            <article class="panel">
              <div class="panel-head">
                <div>
                  <div class="panel-kicker">Lane Frequency</div>
                  <h2 class="section-title">Most logged locations</h2>
                </div>
              </div>
              ${locations.length ? `
                <div class="list-stack">
                  ${locations.map(([name, count]) => `
                    <div class="list-line">
                      <div class="list-icon">◉</div>
                      <div>
                        <strong>${escapeHtml(name)}</strong>
                        <small>${count} stored session${count === 1 ? "" : "s"}</small>
                      </div>
                      <span class="score-pill">${count}</span>
                    </div>
                  `).join("")}
                </div>
              ` : `<p class="panel-note">Lane frequency will appear once locations start repeating.</p>`}
            </article>
          </section>
        </div>
      `;
    }

    function renderCoachPage() {
      const root = $("#page-coach");
      const lines = getCoachLines();
      const top = getTopLogs(1)[0];
      const metrics = calcMetrics();
      root.innerHTML = `
        <div class="page-grid">
          <section class="coach-grid">
            <article class="coach-card">
              <div class="panel-head">
                <div>
                  <div class="panel-kicker">AI coach</div>
                  <h2 class="section-title">Session Readout</H2>
                  <p class="section-subtitle">This is the part where the robot acts slightly judgmental about your bowling numbers.</p>
                </div>
                <button class="primary-btn" id="refreshCoachBtn">Reroll Advice</button>
              </div>
              <div class="coach-console" id="coachConsole">
                ${lines.map(line => `
                  <div class="coach-line">
                    <span class="coach-dot"></span>
                    <div>
                      <strong>coach</strong>
                      <span>${escapeHtml(line)}</span>
                    </div>
                  </div>
                `).join("")}
              </div>
            </article>

            <article class="coach-card">
              <div class="panel-head">
                <div>
                  <div class="panel-kicker">Quick Read</Div>
                  <h2 class="section-title">Current Situation</H2>
                </div>
              </div>
              <div class="coach-console">
                <div class="coach-line"><span class="coach-dot"></span><div><strong>Average</strong><span>${metrics.average} points across stored sessions.</span></div></div>
                <div class="coach-line"><span class="coach-dot"></span><div><strong>Best Run</strong><span>${top ? `${top.score} at ${escapeHtml(top.location || "Unknown Lane")}` : "No best run yet!"}.</span></div></div>
                <div class="coach-line"><span class="coach-dot"></span><div><strong>Archive pressure</strong><span>${state.logs.filter(log => log.archived).length} sessions are stored away.</span></div></div>
              </div>
              <div class="coach-actions">
                <button class="ghost-btn" id="coachAddLogBtn">Log a Session</Button>
                <button class="ghost-btn" id="coachOpenStatsBtn">Open Statistics</button>
              </div>
            </article>
          </section>
        </div>
      `;

      $("#refreshCoachBtn")?.addEventListener("click", () => renderCoachPage());
      $("#coachAddLogBtn")?.addEventListener("click", () => openDrawer("logDrawer"));
      $("#coachOpenStatsBtn")?.addEventListener("click", () => showPage("statistics"));
    }

    function renderKpiCard(label, value, note, icon) {
      const metrics = calcMetrics();
      const trendNote = metrics.total ? `${metrics.total} total stored` : "waiting for data";
      return `
        <article class="kpi-card">
          <div class="kpi-head">
            <div>
              <div class="kpi-label">${escapeHtml(label)}</div>
            </div>
            <div class="kpi-icon">${icon}</div>
          </div>
          <div class="kpi-value">${escapeHtml(value)}</div>
          <div class="kpi-foot">
            <div class="kpi-note">${escapeHtml(note)}</div>
            <span class="kpi-trend">${escapeHtml(trendNote)}</span>
          </div>
        </article>
      `;
    }

    function renderRecentLine(log) {
      return `
        <div class="list-line">
          <div class="list-icon">◎</div>
          <div>
            <strong>${escapeHtml(log.location || "unknown lane")}</strong>
            <small>${formatDate(log.date)} · ${escapeHtml(log.ball || "unknown")} ball · ${escapeHtml(log.notes || "no note")}</small>
          </div>
          <span class="score-pill">${escapeHtml(log.score)} pts</span>
        </div>
      `;
    }

    function renderArchiveLine(log) {
      return `
        <div class="list-line">
          <div class="list-icon">▣</div>
          <div>
            <strong>${escapeHtml(log.location || "unknown lane")}</strong>
            <small>${formatDate(log.date)} · Archived Session</small>
          </div>
          <span class="score-pill">${escapeHtml(log.score)} pts</span>
        </div>
      `;
    }

    function renderEmptyInline(title, copy) {
      return `
        <div class="empty-state">
          <strong>${escapeHtml(title)}</strong>
          <p>${escapeHtml(copy)}</p>
        </div>
      `;
    }

    function renderTableRow(log, index, archived) {
      const realIndex = state.logs.findIndex(item => item === log);
      return `
        <tr>
          <td>
            <div>${formatCompactDate(log.date)}</div>
            <div class="table-meta">${formatDate(log.date)}</div>
          </td>
          <td>${escapeHtml(log.location || "unknown lane")}</td>
          <td><span class="score-pill">${escapeHtml(log.score)}</span></td>
          <td><span class="tag">${escapeHtml(log.ball || "unknown")}</span></td>
          <td>${escapeHtml(log.notes || "-")}</td>
          <td>
            <div class="table-actions">
              <button class="table-link" data-action="toggle-archive" data-index="${realIndex}">${archived ? "Restore" : "Archive"}</button>
              <button class="table-link" data-action="delete" data-index="${realIndex}">Delete</button>
            </div>
          </td>
        </tr>
      `;
    }

  (function () {
    const toast = document.getElementById("beToast");
    const closeBtn = document.getElementById("beToastClose");

    function showToast() {
      toast.classList.add("show");
      setTimeout(() => {
        toast.classList.remove("show");
        toast.classList.add("hide");
      }, 4000);
    }

    if (closeBtn) {
      closeBtn.addEventListener("click", () => {
        toast.classList.remove("show");
        toast.classList.add("hide");
      });
    }

    // hook into your existing save logic
    const originalSave = window.saveLog;

    window.saveLog = function (...args) {
      if (originalSave) originalSave.apply(this, args);
    };
  })();
	
    function bindRowActionButtons(scope) {
      scope.querySelectorAll("[data-action='toggle-archive']").forEach(button => {
        button.addEventListener("click", () => {
          const index = Number(button.dataset.index);
          if (Number.isNaN(index) || !state.logs[index]) return;
          state.logs[index].archived = !state.logs[index].archived;
          persistLogs();
          renderAllPages();
        });
      });

      scope.querySelectorAll("[data-action='delete']").forEach(button => {
        button.addEventListener("click", () => {
          const index = Number(button.dataset.index);
          if (Number.isNaN(index) || !state.logs[index]) return;
          const confirmed = confirm("Delete this stored log permanently?");
          if (!confirmed) return;
          state.logs.splice(index, 1);
          persistLogs();
          renderAllPages();
        });
      });
    }

    function renderAllPages() {
      renderSidebar($("#sidebar"));
      renderSidebar($("#mobileSidebar"), true);
      renderOverviewPage();
      renderLogsPage();
      renderLeaderboardPage();
      renderArchivePage();
      renderAchievementsPage();
      renderStatisticsPage();
      renderCoachPage();
      applyTheme();
      updatePageVisibility();
      syncSearchInputs();
      syncSettingsFields();
    }

    function updatePageVisibility() {
      NAV_ITEMS.forEach(item => {
        const page = $(`#page-${item.id}`);
        if (!page) return;
        page.classList.toggle("active", state.currentPage === item.id);
      });
      const current = NAV_ITEMS.find(item => item.id === state.currentPage);
      $("#pageTitle").textContent = current ? current.label : "Overview";
    }

    function showPage(id) {
      state.currentPage = id;
      renderAllPages();
    }

    function openDrawer(id) {
      state.activeDrawer = id;
      $("#overlay").classList.add("active");
      $(`#${id}`).classList.add("active");
      $(`#${id}`).setAttribute("aria-hidden", "false");
      if (id === "logDrawer") prepareLogForm();
      if (id === "settingsDrawer") syncSettingsFields();
    }

    function closeDrawer(id) {
      const drawer = $(`#${id}`);
      if (!drawer) return;
      drawer.classList.remove("active");
      drawer.setAttribute("aria-hidden", "true");
      if (state.activeDrawer === id) state.activeDrawer = null;
      if (!$(".drawer.active")) {
        $("#overlay").classList.remove("active");
      }
    }

    function closeAllDrawers() {
      $$(".drawer.active").forEach(drawer => closeDrawer(drawer.id));
      $("#overlay").classList.remove("active");
      state.activeDrawer = null;
    }

    function toggleMobileMenu(force) {
      const next = typeof force === "boolean" ? force : !state.mobileMenuOpen;
      state.mobileMenuOpen = next;
      $("#mobileSidebar").classList.toggle("active", next);
      $("#overlay").classList.toggle("active", next || Boolean($(".drawer.active")));
    }

    function applyTheme() {
      document.body.classList.toggle("light", state.settings.theme === "light");
    }

    function syncSearchInputs() {
      $("#globalSearch").value = state.filters.query;
    }

    function setSegmentActive(container, value) {
      container.querySelectorAll("button[data-ball]").forEach(button => {
        button.classList.toggle("active", button.dataset.ball === value);
      });
    }

    function prepareLogForm() {
      $("#logDate").value = todayISO();
      $("#logLocation").value = state.settings.defaultLocation || "";
      $("#logScore").value = "";
      $("#logNotes").value = "";
      $("#logArchiveToggle").checked = false;
      state.activeBallDraft = state.settings.defaultBall || "light";
      setSegmentActive($("#ballSegment"), state.activeBallDraft);
    }

    function syncSettingsFields() {
      $("#setUsername").value = state.settings.username || "";
      $("#setDefaultLocation").value = state.settings.defaultLocation || "";
      $("#setTheme").value = state.settings.theme || "dark";
      $("#setPublic").checked = Boolean(state.settings.showScore);
      $("#setPrivacy").checked = Boolean(state.settings.privacy);
      $("#setEmail").checked = Boolean(state.settings.email);
      $("#setSound").checked = Boolean(state.settings.sound);
      $("#set2FA").checked = Boolean(state.settings.enable2FA);
      $("#setPhone").value = state.settings.phone || "";
      state.activeBallDefault = state.settings.defaultBall || "light";
      setSegmentActive($("#defaultBallSegment"), state.activeBallDefault);
      $("#phoneField").classList.toggle("hide", !state.settings.enable2FA && !$("#set2FA").checked);
    }

    function saveLog() {
      const date = $("#logDate").value;
      const location = $("#logLocation").value.trim();
      const score = Number($("#logScore").value);
      const notes = $("#logNotes").value.trim();
      const archived = $("#logArchiveToggle").checked;

      if (!date || !location || !Number.isFinite(score)) {
        alert("Fill date, location, and score first.");
        return;
      }

      const cleanScore = Math.max(0, Math.min(300, Math.round(score)));

      state.logs.push({
        date,
        location,
        score: cleanScore,
        ball: state.activeBallDraft,
        notes,
        archived
      });

      persistLogs();
      closeDrawer("logDrawer");
      renderAllPages();
      showPage("logs");
	  showDashboardToast("Log Created", "Your score log has been added to the modern dashboard.");
    }

    function saveSettings() {
      state.settings = {
        username: $("#setUsername").value.trim() || "lane operator",
        defaultLocation: $("#setDefaultLocation").value.trim(),
        theme: $("#setTheme").value,
        defaultBall: state.activeBallDefault,
        showScore: $("#setPublic").checked,
        privacy: $("#setPrivacy").checked,
        email: $("#setEmail").checked,
        sound: $("#setSound").checked,
        enable2FA: $("#set2FA").checked,
        phone: $("#setPhone").value.trim()
      };

      persistSettings();
      closeDrawer("settingsDrawer");
      renderAllPages();
    }

    function wipeAllData() {
      const confirmed = confirm("Wipe every stored log and setting for this local dashboard?");
      if (!confirmed) return;
      localStorage.removeItem(LOGS_KEY);
      localStorage.removeItem(SETTINGS_KEY);
      localStorage.removeItem(LEGACY_LOGS_KEY);
      localStorage.removeItem(LEGACY_SETTINGS_KEY);
      hydrateState();
      renderAllPages();
      closeDrawer("settingsDrawer");
      showPage("overview");
    }

    function bindGlobalEvents() {
      $("#openLogBtn").addEventListener("click", () => openDrawer("logDrawer"));
      $("#openSettingsBtn").addEventListener("click", () => openDrawer("settingsDrawer"));
      $("#fabButton").addEventListener("click", () => openDrawer("logDrawer"));
      $("#mobileMenuBtn").addEventListener("click", () => toggleMobileMenu(true));
      $("#overlay").addEventListener("click", () => {
        toggleMobileMenu(false);
        closeAllDrawers();
      });
      $$("[data-close]").forEach(button => {
        button.addEventListener("click", () => closeDrawer(button.dataset.close));
      });
      $("#saveLogBtn").addEventListener("click", saveLog);
      $("#saveSettingsBtn").addEventListener("click", saveSettings);
      $("#wipeDataBtn").addEventListener("click", wipeAllData);
      $("#globalSearch").addEventListener("input", event => {
        state.filters.query = event.target.value;
        renderAllPages();
      });

      $("#ballSegment").querySelectorAll("button[data-ball]").forEach(button => {
        button.addEventListener("click", () => {
          state.activeBallDraft = button.dataset.ball;
          setSegmentActive($("#ballSegment"), state.activeBallDraft);
        });
      });

      $("#defaultBallSegment").querySelectorAll("button[data-ball]").forEach(button => {
        button.addEventListener("click", () => {
          state.activeBallDefault = button.dataset.ball;
          setSegmentActive($("#defaultBallSegment"), state.activeBallDefault);
        });
      });

      $("#set2FA").addEventListener("change", event => {
        $("#phoneField").classList.toggle("hide", !event.target.checked);
      });

      $("#setTheme").addEventListener("change", event => {
        document.body.classList.toggle("light", event.target.value === "light");
      });

      document.addEventListener("keydown", event => {
        if (event.key === "Escape") {
          if (state.mobileMenuOpen) toggleMobileMenu(false);
          if (state.activeDrawer) closeAllDrawers();
        }
      });
    }

    function init() {
      hydrateState();
      bindGlobalEvents();
      renderAllPages();
      prepareLogForm();
    }

    init();
  </script>
</body>
</html>
